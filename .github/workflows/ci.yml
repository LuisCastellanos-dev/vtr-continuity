name: VTR Continuity CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  pytest:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn httpx pydantic pytest pytest-asyncio cryptography pyjwt asyncua lz4 PyNaCl

      - name: Ejecutar tests Python
        run: |
          python3 -m pytest server/tests/ core/tests/ rpi/tests/ -v --tb=short

  jest:
    name: JavaScript Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias Node
        run: npm ci

      - name: Ejecutar tests Jest
        run: npm test
